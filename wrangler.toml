# Cloudflare Workers Static Assets — serves the built web app.
# Deployed by the "Deploy Web" GitHub Action on version bumps.
#
# The project name here must match the application name in the
# Cloudflare dashboard (Workers & Pages → Applications).

name = "gratis-vitd-sh"
compatibility_date = "2026-03-04"

[assets]
directory = "./dist"

# SPA routing — serve index.html for any path that doesn't match a static file.
not_found_handling = "single-page-application"
